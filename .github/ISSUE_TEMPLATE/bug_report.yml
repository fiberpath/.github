name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please search existing issues first, and do
        not report security issues here — see the security policy.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (and a `.wind` file or command line if relevant).
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release version or commit SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, and (if relevant) Python/Node versions.
    validations:
      required: false
